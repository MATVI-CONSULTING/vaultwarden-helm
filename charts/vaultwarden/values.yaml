# Default values for vaultwarden.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

image:
  repository: vaultwarden/server
  tag: "1.36.0"
  pullPolicy: IfNotPresent

replicaCount: 1

# Configuration générale de Vaultwarden (variables non-sensibles)
config:
  # URL publique de l'instance — doit correspondre à l'hôte Ingress
  domain: "https://vaultwarden.example.com"
  # Désactiver après création du premier compte admin
  signupsAllowed: "false"
  showPasswordHint: "false"
  # Feature flags
  webVaultEnabled: "true"
  sendsAllowed: "true"
  emergencyAccessAllowed: "true"
  # Qui peut créer des organisations : all | admin | none
  orgCreationUsers: "all"
  orgGroupsEnabled: "false"
  orgEventsEnabled: "false"
  # Restreindre les inscriptions à des domaines email spécifiques (séparés par des virgules)
  # Exemple : "example.com,mycompany.org"
  signupDomains: ""
  # Exiger une vérification de l'adresse email lors de l'inscription
  signupsVerify: "false"
  # Autoriser les utilisateurs à changer leur adresse email
  emailChangeAllowed: "true"
  # Nom de l'organisation dans les emails d'invitation
  invitationOrgName: "Vaultwarden"
  # Durée de validité des invitations en heures
  invitationExpiration: "120"
  # Exiger un email associé à chaque appareil
  requireDeviceEmail: "false"

# Configuration SMTP (variables non-sensibles)
smtp:
  host: ""
  from: ""
  fromName: "Vaultwarden"
  # starttls | force_tls | off
  security: "starttls"
  # 587 (starttls) | 465 (force_tls)
  port: "587"
  username: ""
  # Plain | Login | Xoauth2
  authMechanism: "Plain"
  # Accepter les certificats avec un hostname invalide (utile pour test)
  acceptInvalidHostnames: "false"
  # Accepter les certificats SSL invalides (utile pour test)
  acceptInvalidCerts: "false"
  # Activer le debugging SMTP
  debug: "false"

# Secrets (sensibles — ne pas committer les valeurs réelles)
secrets:
  # Hash Argon2 du mot de passe admin
  # Générer : docker run --rm -it vaultwarden/server /vaultwarden hash --preset owasp
  adminToken: ""
  smtpPassword: ""

# Stockage persistant des données Vaultwarden (/data)
persistence:
  enabled: true
  size: 1Gi
  # Laisser vide pour utiliser la StorageClass par défaut du cluster
  storageClass: ""
  accessMode: ReadWriteOnce

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  host: "vaultwarden.example.com"
  tls:
    enabled: false
    secretName: "vaultwarden-tls"
  # Support WebSocket pour les notifications temps réel (/notifications/hub)
  # Nécessite un ingress controller Nginx avec les annotations appropriées.
  websocket:
    enabled: false

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

# Quotas de stockage (laisser vide = illimité)
storage:
  # Limite de stockage des pièces jointes pour les organisations (en KB)
  orgAttachmentLimit: ""
  # Limite de stockage des pièces jointes par utilisateur (en KB)
  userAttachmentLimit: ""
  # Limite de stockage pour les Sends par utilisateur (en KB)
  sendStorageLimit: ""
  # Nombre de jours avant suppression automatique de la corbeille (0 = désactivé)
  trashAutoDeletion: ""

jobs:
  # Rappel pour les accès d'urgence en attente (défaut Vaultwarden : toutes les heures)
  emergencyNotificationReminder: ""
  # Timeout des demandes d'accès d'urgence expirées (défaut : toutes les heures)
  emergencyAccessRequestTimeout: ""
  # Nettoyage des événements de l'organisation (défaut : tous les jours à 10h)
  eventCleanup: ""
  # Rétention des événements en jours (laisser vide = illimité)
  eventRetentionDays: ""

duo:
  # Integration key (iKey)
  iKey: ""
  # Secret key (sensible)
  secretKey: ""
  # API hostname (ex: api-XXXXXXXX.duosecurity.com)
  hostname: ""

yubikey:
  # Client ID de l'API Yubico
  clientId: ""
  # Clé secrète Yubico (sensible)
  secretKey: ""
  # Serveur de validation personnalisé (laisser vide pour utiliser api.yubico.com)
  server: ""

# Authentification Duo Security (https://duo.com)

affinity: {}

# Pod metadata

containerSecurityContext: {}

# Image pull secrets for private registries

extraEnvVars: []

# Startup probe (useful for slow cluster startup)

imagePullSecrets: []

# Extra environment variables injected into the container
# - name: MY_VAR
#   value: "my-value"

nodeSelector: {}

podAnnotations: {}

podLabels: {}

# Security contexts

securityContext: {}

startupProbe:
  enabled: false
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

tolerations: []

sso:
  # Activer l'authentification SSO
  enabled: false
  # Forcer l'utilisation exclusive du SSO (désactive l'authentification par mot de passe)
  onlySSO: false
  # URL de découverte OpenID Connect (ex: https://idp.example.com/.well-known/openid-configuration)
  authority: ""
  # Client ID de l'application
  clientId: ""
  # Client secret (sensible)
  clientSecret: ""
  # Activer PKCE (Proof Key for Code Exchange)
  pkce: true
  # Scopes demandés
  scopes: "email profile"
  # Politique de mot de passe maître (JSON, laisser vide pour désactiver)
  masterPasswordPolicy: ""

pushNotifications:
  enabled: false
  # ID d'installation obtenu sur bitwarden.com/host
  installationId: ""
  # Clé d'installation (sensible)
  installationKey: ""
  # URI du relay (laisser vide pour utiliser le relay Bitwarden par défaut)
  relayUri: ""
  # URI d'identité (laisser vide pour utiliser l'identité Bitwarden par défaut)
  identityUri: ""

database:
  # sqlite | mysql | postgresql
  type: "sqlite"
  host: ""
  port: ""
  name: "vaultwarden"
  username: ""
  password: ""
  # Si renseigné, remplace la construction automatique de l'URL
  # Exemple : "postgresql://user:password@host:5432/vaultwarden"
  uri: ""

admin:
  # Délai de rate limiting en secondes
  rateLimitSeconds: "300"
  # Nombre maximum de tentatives dans la fenêtre de rate limiting
  rateLimitMaxBurst: "3"

# Configuration du logging

hibp:
  # Clé API HIBP (sensible) — obtenir sur haveibeenpwned.com/API/Key
  apiKey: ""

# Service d'icônes (favicon des sites web dans les entrées)

icons:
  # Service à utiliser : internal | bitwarden | duckduckgo | google | <URL personnalisée>
  service: "internal"
  # Code de redirection HTTP (301 | 302)
  redirectCode: "302"
  # Désactiver le téléchargement des icônes depuis des IP locales/privées
  disableLocalNetworkAccess: "false"

# Configuration du panneau d'administration

logging:
  # Niveau de log : trace | debug | info | warn | error
  level: "info"
  # Chemin vers un fichier de log (laisser vide pour écrire uniquement sur stdout)
  file: ""
  # Activer le logging étendu avec timestamps
  timestamps: "false"
