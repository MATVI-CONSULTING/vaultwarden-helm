apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart.fullname" . }}-vaultwarden
  labels:
    {{- include "chart.labels" . | nindent 4 }}
data:
  DOMAIN: {{ .Values.config.domain | quote }}
  SIGNUPS_ALLOWED: {{ .Values.config.signupsAllowed | quote }}
  SHOW_PASSWORD_HINT: {{ .Values.config.showPasswordHint | quote }}
  WEB_VAULT_ENABLED: {{ .Values.config.webVaultEnabled | quote }}
  SENDS_ALLOWED: {{ .Values.config.sendsAllowed | quote }}
  EMERGENCY_ACCESS_ALLOWED: {{ .Values.config.emergencyAccessAllowed | quote }}
  ORG_CREATION_USERS: {{ .Values.config.orgCreationUsers | quote }}
  ORG_GROUPS_ENABLED: {{ .Values.config.orgGroupsEnabled | quote }}
  ORG_EVENTS_ENABLED: {{ .Values.config.orgEventsEnabled | quote }}
  SMTP_HOST: {{ .Values.smtp.host | quote }}
  SMTP_FROM: {{ .Values.smtp.from | quote }}
  SMTP_FROM_NAME: {{ .Values.smtp.fromName | quote }}
  SMTP_SECURITY: {{ .Values.smtp.security | quote }}
  SMTP_PORT: {{ .Values.smtp.port | quote }}
  SMTP_USERNAME: {{ .Values.smtp.username | quote }}
  {{- if .Values.storage.orgAttachmentLimit }}
  ORG_ATTACHMENT_LIMIT: {{ .Values.storage.orgAttachmentLimit | quote }}
  {{- end }}
  {{- if .Values.storage.userAttachmentLimit }}
  USER_ATTACHMENT_LIMIT: {{ .Values.storage.userAttachmentLimit | quote }}
  {{- end }}
  {{- if .Values.storage.sendStorageLimit }}
  SEND_STORAGE_LIMIT: {{ .Values.storage.sendStorageLimit | quote }}
  {{- end }}
  {{- if .Values.storage.trashAutoDeletion }}
  TRASH_AUTO_DELETE_DAYS: {{ .Values.storage.trashAutoDeletion | quote }}
  {{- end }}
